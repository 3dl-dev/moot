name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for Pages deploy via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24 # Active LTS (EOL 2028-04); even majors go LTS each Oct
          cache: npm
      - run: npm ci
      - run: node --test *.test.ts # gate: a failing test fails build, so deploy (needs: build) is skipped
      - run: npm run build # next.config.ts: output: 'export' -> ./out
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out
          # Without this, the action's tar runs `--exclude=.[^/]*` and drops every
          # top-level dot-folder — including public/.well-known, which breaks NIP-05
          # (name@moot.pub). Actions-based Pages serves the artifact as-is (no Jekyll),
          # so hidden files are safe to include.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
